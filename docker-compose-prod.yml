services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - nlp_models_volume:/app/nlp_models
    expose:
      - 8000
    env_file: .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py qcluster
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - nlp_models_volume:/app/nlp_models
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - 3000
    env_file: ./frontend/.env
    environment:
      - INTERNAL_API_HOST=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:15
    profiles:
      - db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env

  ollama:
    image: ollama/ollama
    container_name: tractor-ollama
    volumes:
      - ollama_data:/root/.ollama
    # For NVIDIA GPU passthrough, use the docker-compose.gpu.yml override:
    # docker compose -f docker-compose-prod.yml -f docker-compose.gpu.yml up -d

volumes:
  postgres_data:
  static_volume:
  media_volume:
  nlp_models_volume:
  ollama_data:
