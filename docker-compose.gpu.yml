# GPU override for NVIDIA hardware.
#
# Apply on top of the production Compose file to enable GPU passthrough
# for the Ollama service:
#
#   docker compose -f docker-compose-prod.yml -f docker-compose.gpu.yml up --build -d
#
# Requirements:
#   - NVIDIA drivers installed on the host
#   - nvidia-container-toolkit installed (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
#
# On Apple Silicon, Ollama auto-detects and uses Metal GPU — no override needed.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
