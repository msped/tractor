version: '3.9'
services:
  db:
    restart: always
    image: postgres:15
    container_name: tractor-postgres
    env_file:
      - '.env'
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/

  ollama:
    image: ollama/ollama
    container_name: tractor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU passthrough in production
    # (requires NVIDIA drivers + nvidia-docker2 on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data: